services:
  - type: web
    name: xpressmen-api
    runtime: node
    plan: free
    region: ohio
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: xpressmen-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://xpressmendelivery.com
      - key: SENDGRID_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1

databases:
  - name: xpressmen-db
    plan: free
    region: ohio
